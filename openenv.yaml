version: "1.0.0"
name: openenv-scalar
type: container
runtime: docker
app:
  entrypoint: "python server/app.py"
  port: 7860
supports_concurrent_sessions: false

# --------------------------------------------------
# Phase 2 Task Registration (Dotted Grader Paths)
# --------------------------------------------------
tasks:
  - id: "security_triage"
    name: "Security Alert Triage"
    description: "Handle security emails"
    difficulty: "hard"
    grader: "tasks.security.grader.grade"
  - id: "marketing_filter"
    name: "Marketing Content Filter"
    description: "Handle spam emails"
    difficulty: "easy"
    grader: "tasks.marketing.grader.grade"
  - id: "office_tasks"
    name: "Professional Communication"
    description: "Handle office emails"
    difficulty: "medium"
    grader: "tasks.office.grader.grade"
